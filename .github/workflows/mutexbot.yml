name: Mutexbot

on:
  pull_request:
    types: ["opened", "synchronize", "reopened", "closed"]
    branches: ["main"]
    paths: ["mutexbot/**"]
  push:
    branches: ["main"]
    paths: ["mutexbot/**"]
    tags: ["mutexbot-v*.*.*"]

permissions:
  contents: read

jobs:
  build:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ${{ fromJson(format('["{0}"]', matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04')) }}
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481 # v2.11.0
        with:
          egress-policy: audit

      - name: Fetch mutexbot folder
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          sparse-checkout: mutexbot

      - name: Generate archive name
        working-directory: mutexbot
        run: |
          cargo install default-target
          echo "ARCHIVE_NAME=mutexbot-$(default-target)" | tee -a "${GITHUB_ENV}"

      - name: Build
        working-directory: mutexbot
        run: |
          cargo build --release
          mv target/release/mutexbot assets
          mv assets "${ARCHIVE_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: mutexbot/${{ env.ARCHIVE_NAME }}

  create-release:
    needs: [build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Fetch artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: "!*.dockerbuild"

      - name: Create archives
        run: |
          for artifact in $(ls); do
            chmod a+x "${artifact}/mutexbot"
            tar cvf "${artifact}.tar.zst" "${artifact}"
          done
          
      - name: Create release from tag
        if: github.ref_type == 'tag'
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Release ${{ github.ref_name }}" \
            --notes "Release for ${{ github.ref_name }}" \
            --verify-tag \
            mutexbot-*.tar.zst
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update pre-release
        if: github.ref_type != 'tag'
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TAG="mutexbot-pr-${{ github.event.pull_request.number }}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            TAG="mutexbot-main"
          else
            echo "Unsupported pre-release trigger" && exit 1
          fi

          # Delete existing pre-release if it exists
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Deleting existing release $TAG"
            gh release delete "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --yes \
              --cleanup-tag
          fi

          gh release create "$TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${COMMIT_SHA}" \
            --prerelease \
            --title "Pre-release for $TAG" \
            --notes "Pre-release for $TAG" \
            mutexbot-*.tar.zst
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  delete-prerelease:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Delete pre-release for closed PR
        run: |
          echo "Deleting pre-release for PR #${{ github.event.pull_request.number }}"
          gh release delete "mutexbot-pr-${{ github.event.pull_request.number }}" \
            --yes \
            --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-mutexbot-action:
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481 # v2.11.0
        with:
          egress-policy: audit

      - name: Fetch mutexbot folder
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: mutexbot

      - name: Reserve test-resource as component A
        uses: ./mutexbot
        with:
          api_key: ${{ secrets.MUTEXBOT_API_KEY_TEST_COMPONENT_A }}
          mode: reserve
          resource_name: test-resource
          isolation_channel: ${{ vars.MUTEXBOT_CHANNEL_TESTING }}

      - name: Try (and fail) to reserve test-resource as component B
        uses: ./mutexbot
        continue-on-error: true
        timeout-minutes: 1
        with:
          api_key: ${{ secrets.MUTEXBOT_API_KEY_TEST_COMPONENT_B }}
          mode: reserve
          resource_name: test-resource
          isolation_channel: ${{ vars.MUTEXBOT_CHANNEL_TESTING }}

      - name: Try (and fail) to release as component B
        uses: ./mutexbot
        continue-on-error: true
        timeout-minutes: 1
        with:
          api_key: ${{ secrets.MUTEXBOT_API_KEY_TEST_COMPONENT_B }}
          mode: release
          resource_name: test-resource
          isolation_channel: ${{ vars.MUTEXBOT_CHANNEL_TESTING }}

      - name: Reduce reservation as component A
        uses: ./mutexbot
        with:
          api_key: ${{ secrets.MUTEXBOT_API_KEY_TEST_COMPONENT_A }}
          mode: reserve
          duration: 10m
          resource_name: test-resource
          isolation_channel: ${{ vars.MUTEXBOT_CHANNEL_TESTING }}

      - name: Force release as component B
        uses: ./mutexbot
        with:
          api_key: ${{ secrets.MUTEXBOT_API_KEY_TEST_COMPONENT_B }}
          mode: force-release
          resource_name: test-resource
          isolation_channel: ${{ vars.MUTEXBOT_CHANNEL_TESTING }}
